<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#22577a" />
    <meta name="description" content="Mess Bondhu Pro - Bangladesh Mess Management System. Offline-first PWA for shared apartment management." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mess Bondhu" />
    <link rel="icon" type="image/png" href="/icons/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Mess Bondhu Pro</title>
    <style>
      @font-face {
        font-family: 'Bpmf Iansui';
        src: url('https://cdn.jsdelivr.net/gh/ButTaiwan/iansui@v2.01/ttf/Iansui-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Bpmf Iansui';
        src: url('https://cdn.jsdelivr.net/gh/ButTaiwan/iansui@v2.01/ttf/Iansui-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      /* Prevent FOUC */
      html.dark { background-color: #0f172a; color: #e2e8f0; }
      html.light { background-color: #f8fafc; color: #1e293b; }
      body { margin: 0; padding: 0; min-height: 100vh; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
      /* Loading skeleton */
      .app-loading {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; flex-direction: column; gap: 16px;
        font-family: 'Bpmf Iansui', sans-serif;
      }
      .app-loading .spinner {
        width: 40px; height: 40px; border: 3px solid var(--tea-green, #c7f9cc);
        border-top-color: var(--baltic-blue, #22577a); border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="spinner"></div>
        <p style="color: var(--baltic-blue, #22577a); font-weight: 600;">Mess Bondhu Pro</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
